    <style>
  /* 阴影层：模糊 + 半透明 */
  #shadow-layer {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none; z-index: 9998;
    filter: blur(8px); opacity: 0.5;
  }
  /* 主体层：正常显示 */
  #main-layer {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none; z-index: 9999;
  }
</style>
    <canvas id="shadow-layer"></canvas>
    <canvas id="main-layer"></canvas>
    <script>
  const shadowCanvas = document.getElementById('shadow-layer');
  const mainCanvas   = document.getElementById('main-layer');
  const sCtx = shadowCanvas.getContext('2d');
  const mCtx = mainCanvas  .getContext('2d');
  // —— 参数 —— 
  const scaleFactor      = 0.5;    // 图像缩放
  const parallaxStrength = 0.33;   // 视差强度
  const smoothness       = 0.05;   // 缓动系数
  const baseDispersion   = 8;      // 单位偏移 px
  const multiplier       = 30;     // 倍数 => 240px 偏移量
  const disp             = baseDispersion * multiplier;
  const resolutionScale  = 0.33;   // 内部分辨率缩放 (33%)
  // 通道配置
  const channelConfigs = {
    c: { parallaxDir:{x:-1,y:1}, dispDir:{x:0,y:-1}, color:'cyan'    },
    m: { parallaxDir:{x:1, y:-1},dispDir:{x:-1,y:1}, color:'magenta'},
    y: { parallaxDir:{x:1, y:1}, dispDir:{x:1, y:1}, color:'yellow' }
  };
  // 状态
  let imgLoaded = false, img, w, h;
  const tintedCanvases = {};
  // 鼠标 & 缓动
  let tX=0.5, tY=0.5, cX=0.5, cY=0.5;
  window.addEventListener('mousemove', e => {
    tX = e.clientX / innerWidth;
    tY = e.clientY / innerHeight;
  });
  function lerp(a,b,t){ return a + (b-a)*t; }
  function resize() {
    // CSS 始终全屏
    shadowCanvas.style.width = mainCanvas.style.width = window.innerWidth + 'px';
    shadowCanvas.style.height= mainCanvas.style.height= window.innerHeight + 'px';
    // 内部实际像素按比例缩减
    shadowCanvas.width  = mainCanvas.width  = Math.floor(window.innerWidth  * resolutionScale);
    shadowCanvas.height = mainCanvas.height = Math.floor(window.innerHeight * resolutionScale);
    // 坐标缩放，让绘图调用无需改动
    sCtx.setTransform(resolutionScale, 0, 0, resolutionScale, 0, 0);
    mCtx.setTransform(resolutionScale, 0, 0, resolutionScale, 0, 0);
  }
  window.addEventListener('resize', resize);
  // 离屏：生成纯色蒙版
  function makeTint(color) {
    const off = document.createElement('canvas');
    off.width  = w;
    off.height = h;
    const o = off.getContext('2d');
    o.drawImage(img, 0,0, img.width,img.height, 0,0, w,h);
    o.globalCompositeOperation = 'source-in';
    o.fillStyle = color;
    o.fillRect(0,0,w,h);
    return off;
  }
  // 主循环
  function loop() {
    if(!imgLoaded) return;
    // 缓动
    cX = lerp(cX, tX, smoothness);
    cY = lerp(cY, tY, smoothness);
    // 居中 + 视差偏移
    const centerX = (window.innerWidth  - w) * 0.5;
    const centerY = (window.innerHeight - h) * 0.5;
    const deltaX  = (cX - 0.5)*(window.innerWidth  - w)*parallaxStrength;
    const deltaY  = (cY - 0.5)*(window.innerHeight - h)*parallaxStrength;
    // 清空（内部分辨率已缩减，会更快）
    sCtx.clearRect(0,0, window.innerWidth, window.innerHeight);
    mCtx.clearRect(0,0, window.innerWidth, window.innerHeight);
    // 阴影层：各通道独立视差 + 投影
    sCtx.globalAlpha = 0.5;
    for(const key of ['c','m','y']){
      const cfg = channelConfigs[key];
      const layer = tintedCanvases[key];
      const px = centerX + deltaX * cfg.parallaxDir.x;
      const py = centerY + deltaY * cfg.parallaxDir.y;
      const ox = px + cfg.dispDir.x * disp;
      const oy = py + cfg.dispDir.y * disp;
      sCtx.drawImage(layer, ox, oy, w, h);
    }
    // 主体层：正常方向
    mCtx.drawImage(img,
      0,0, img.width,img.height,
      centerX + deltaX,
      centerY + deltaY,
      w, h
    );
    requestAnimationFrame(loop);
  }
  // 图片加载 & 缓存
  img = new Image();
  img.src = 'https://cdn.prod.website-files.com/68298597f9165ea00766186b/682b07ba76ef3be39165138e_plus.png';
  img.onload = () => {
    imgLoaded = true;
    // 计算缩放后尺寸
    w = img.width  * scaleFactor;
    h = img.height * scaleFactor;
    resize();
    // 缓存 CMY 图层
    for(const key of ['c','m','y']){
      tintedCanvases[key] = makeTint(channelConfigs[key].color);
    }
    requestAnimationFrame(loop);
  };
</script>
