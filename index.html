<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spoy · Interactive Works</title>
  <meta name="description" content="Interactive works & experiments — Spoy" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/webclip.png" />
  <link rel="stylesheet" href="src/styles/base.css" />
</head>
<body>
  <!-- 全局语言切换（差值混合，自动适配深浅背景） -->
  <nav id="lang-switcher" aria-label="Language">
    <button class="lang-btn" data-lang="zh">中文</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="de">DE</button>
    <button class="lang-btn" data-lang="ja">日本語</button>
  </nav>

  <!-- 板块挂载点：所有板块由引擎按 config/sections.js 注入 -->
  <main id="app"></main>

  <!-- 回到顶部 -->
  <button id="to-top" type="button" data-i18n="nav.top" aria-label="Top">▲ Top</button>

  <!-- 唯一入口：其余一切由 ES Modules 驱动 -->
  <script type="module" src="src/main.js"></script>

  <!-- 无 JS 兜底 -->
  <noscript>
    <p style="color:#fff;text-align:center;padding:2rem">
      This site requires JavaScript to show its interactive works.
    </p>
  </noscript>
</body>
</html>
