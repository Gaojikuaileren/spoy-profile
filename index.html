  const canvas = document.getElementById('canvas-layer');
  const ctx = canvas.getContext('2d');
  const scaleFactor = 0.5;           // 缩小倍数（原图的一半）
  const parallaxStrength = 0.33;     // 视差位移比例（越小越稳定）
  const smoothness = 0.05;           // 缓动系数（越小越慢）
  let img = new Image();
  let imageLoaded = false;
  let targetMouseX = 0.5;
  let targetMouseY = 0.5;
  let currentMouseX = 0.5;
  let currentMouseY = 0.5;
  function lerp(a, b, t) {
    return a + (b - a) * t;
  }
  function resizeCanvasToWindow() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('mousemove', (e) => {
    targetMouseX = e.clientX / window.innerWidth;
    targetMouseY = e.clientY / window.innerHeight;
  });
  function animate() {
    if (!imageLoaded) return;
    // 缓动移动
    currentMouseX = lerp(currentMouseX, targetMouseX, smoothness);
    currentMouseY = lerp(currentMouseY, targetMouseY, smoothness);
    const scaledWidth = img.width * scaleFactor;
    const scaledHeight = img.height * scaleFactor;
    const maxOffsetX = scaledWidth - canvas.width;
    const maxOffsetY = scaledHeight - canvas.height;
    const offsetX = -maxOffsetX * currentMouseX * parallaxStrength;
    const offsetY = -maxOffsetY * currentMouseY * parallaxStrength;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(
      img,
      0, 0, img.width, img.height,
      offsetX, offsetY, scaledWidth, scaledHeight
    );
    requestAnimationFrame(animate);
  }

    imageLoaded = true;
    resizeCanvasToWindow();
    animate();
  };

</script>
